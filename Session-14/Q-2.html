<!DOCTYPE html>
<html lang="en">
<head>
    <title>Even Number Check</title>
</head>
<body>

<script>
    // Function to check whether a number is even
    function isEven(num) {

        // Check if the number is divisible by 2
        if (num % 2 == 0) {

            // Return true if the number is even
            return true;
        }
        else {

            // Return false if the number is odd
            return false;
        }
    }

    // Call the function with a number
    console.log(isEven(10));
</script>

</body>
</html>
