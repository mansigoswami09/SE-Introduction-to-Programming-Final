<!DOCTYPE html>
<html lang="en">
<head>
    <title>Instagram Followers</title>
</head>
<body>
    <script>
        //function to format the followers count
        function formatFollowersCount(count){

            //check if the count is 1 million or more
            if(count >=1000000){

                //convert the count into millions and odd 'M'
                return (count / 1000000).toFixed(1) + "M";
            }
            //check if the count is 1000 or more
            else if(count >= 1000){

                //conver the count into thousands and odd 'k'
                return (count / 1000).toFixed(1) + "k";
            }
            //return the number as it is if it is below 1000
            else{
                return count;
            }
        }
        //display the formatted followers count
        console.log(formatFollowersCount(1500));
        console.log(formatFollowersCount(1200000));
        console.log(formatFollowersCount(500));
    </script>
</body>
</html>
