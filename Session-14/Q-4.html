<!DOCTYPE html>
<html lang="en">
<head>
    <title>Even Numbers</title>
</head>
<body>

<script>
    // Loop from 1 to 10 and print only even numbers
    for (let i = 1; i <= 10; i++) {

        // Check if the number is divisible by 2
        if (i % 2 === 0) {
            console.log(i);
        }
    }
</script>

</body>
</html>
